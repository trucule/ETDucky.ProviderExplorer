# Continuous integration build for every push and pull request.
#
# Builds the project on a clean windows-2022 runner so PRs are gated on
# "does this still compile" before merge. No tests yet (the project has no
# test project); when one is added, add a `dotnet test` step here.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Release, win-x64)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ETDucky.ProviderExplorer.csproj

      - name: Build (Release)
        run: dotnet build ETDucky.ProviderExplorer.csproj -c Release --no-restore

      - name: Publish (single-file, self-contained) — smoke test
        run: |
          dotnet publish ETDucky.ProviderExplorer.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o publish

      - name: Confirm output binary exists
        run: |
          if (!(Test-Path publish\ETDucky.ProviderExplorer.exe)) {
            Write-Error "Expected publish\ETDucky.ProviderExplorer.exe was not produced."
            exit 1
          }
          Get-Item publish\ETDucky.ProviderExplorer.exe | Select-Object Length, LastWriteTime
